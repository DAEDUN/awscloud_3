services:
  app:
    build: .
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      PORT: 3000
      NODE_ENV: production
      CORS_ORIGIN: ${CORS_ORIGIN:-}
      DB_INIT_RETRY_INTERVAL_MS: ${DB_INIT_RETRY_INTERVAL_MS:-10000}
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: ${DB_USER:-studyroom}
      DB_PASSWORD: ${DB_PASSWORD:-studyroom_password}
      DB_NAME: ${DB_NAME:-studyroom_db}
      DB_SSL: "false"
    depends_on:
      mysql:
        condition: service_healthy

  mysql:
    image: mysql:8.0
    restart: unless-stopped
    expose:
      - "3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password}
      MYSQL_DATABASE: ${DB_NAME:-studyroom_db}
      MYSQL_USER: ${DB_USER:-studyroom}
      MYSQL_PASSWORD: ${DB_PASSWORD:-studyroom_password}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u$$MYSQL_USER -p$$MYSQL_PASSWORD --silent"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  mysql_data:
